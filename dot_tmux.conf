# ~/.tmux.conf — managed by chezmoi (dot_tmux.conf)
#
# Mental model:
#   session = "workspace"     — top-level grouping (e.g. one per project)
#   window  = "terminal tab"  — horizontal tabs within a workspace
#   pane    = a split inside a tab
#
# Navigation uses Alt/Option with no prefix. Option must reach tmux as Meta:
# in Ghostty that's `macos-option-as-alt`. Works locally and over SSH.

#### Navigation — alt+hjkl, mirroring the cross-tool design ####

# Terminal tabs (windows): Alt+h / Alt+l to switch, Alt+Shift+h / Alt+Shift+l
# to swap the current tab left/right. `-d` keeps the focused pane in place
# while the window moves, so visual context doesn't jump.
#
# Shift bindings are doubled: with `extended-keys on` (below) Ghostty sends
# Alt+Shift+h as the CSI-u key M-S-H — uppercase codepoint *plus* the shift
# modifier, NOT M-S-h. A terminal that hasn't negotiated extended keys sends
# the legacy M-H. Bind both so the swap works either way. (M-S-h, the
# lowercase+shift form, is never produced here — don't bind it.)
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-H   swap-window -d -t -1
bind -n M-S-H swap-window -d -t -1
bind -n M-L   swap-window -d -t +1
bind -n M-S-L swap-window -d -t +1

# Workspaces (sessions): Alt+j / Alt+k
bind -n M-j switch-client -n
bind -n M-k switch-client -p

# Create: Alt+t = new tab (window), Alt+n = new workspace (session)
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-n new-session

# Close: Alt+q = close THIS workspace (session) — but only when safe. It refuses
# (and flashes why) if any tab has a running/pending agent (@agent_state) or an
# nvim with unsaved changes; otherwise idle agents/shells get a clean teardown.
# A ~1s debounce stops an accidental double-tap cascading into the next
# workspace. `q` breaks the alt+hjkl model on purpose — it's an action, not a
# direction. run-shell -b backgrounds the helper so its poll can't block tmux.
# See dot_local/bin/executable_tmux-session-close.
bind -n M-q run-shell -b "$HOME/.local/bin/tmux-session-close #{q:session_name} #{q:client_name}"

# Projects: Alt+f = fuzzy project/workspace switcher popup ("find"). Lists every
# running workspace (session) plus every project under ~/workspace not yet open;
# type to filter, Enter to jump — switching to an open one, or creating its
# session and launching `cc` for a not-yet-open project. The tmux twin of the
# snacks.nvim Projects picker, and the in-tmux counterpart to the `t.` shell
# function. See dot_local/bin/executable_tmux-sessionizer.
#
# M-f only works here because Ghostty's default Alt+Right→esc:f mapping (same
# bytes as Alt+f) was remapped to a cursor CSI sequence — see the comment in
# dot_config/ghostty/config. Without that, Alt+Right would also open this popup.
bind -n M-f display-popup -E -B -w 60% -h 70% "$HOME/.local/bin/tmux-sessionizer"

# Rename: Alt+r = rename tab, Alt+Shift+r = rename workspace
# Alt+r starts with an empty prompt (type the new name fresh); Alt+Shift+r
# pre-fills the current session name so you can edit it.
# Alt+Shift+r is doubled (M-S-R / M-R) for the same reason as the swap keys
# above: extended-keys sends the CSI-u key M-S-R (uppercase + shift), legacy
# terminals send M-R.
bind -n M-r   command-prompt "rename-window -- '%%'"
bind -n M-S-R command-prompt -I "#S" "rename-session -- '%%'"
bind -n M-R   command-prompt -I "#S" "rename-session -- '%%'"

#### Prefix bindings (prefix is the default Ctrl-b) ####

# Reload this config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# prefix+w — overview of every workspace (session) and all its tabs (windows);
# -w hides panes, -Z zooms the picker to fill the pane. choose-tree prints a
# bracketed shortcut key on each row — press it to jump straight to that tab.
# The -F format tints each tab by @agent_state (same signal as the per-tab
# status dot): blue █ running, red █ needs-input, yellow ░ idle/done, and
# nothing for non-agent tabs (shells, nvim). The tint carries into the tab name
# so a workspace that needs attention is scannable at a glance. Kept on one line
# on purpose — backslash continuations would fold stray whitespace into the
# format string.
bind w choose-tree -Zw -F "#{?session_format,#[fg=#cba6f7 bold]#{session_name}#[default]#[fg=#6c7086]  #{session_windows} windows#{?session_attached, (attached),},window_format,#{?#{==:#{@agent_state},running},#[fg=#89b4fa]█ ,#{?#{==:#{@agent_state},needs-input},#[fg=#f38ba8]█ ,#{?#{==:#{@agent_state},idle},#[fg=#f9e2af]░ ,#[fg=#cdd6f4]  }}}#{window_index}: #{window_name}#{window_flags},#[fg=#6c7086]#{pane_current_command}}"

# prefix+o — agent overview: a full-screen snapshot montage of every session
# (one band per row) and its tabs (columns). Each window's screen is captured
# and tiled with a state-coloured title, for eyeballing several agents at once.
# Navigate with hjkl/arrows (a peach highlight, wrapping at edges) + Enter to
# jump, or hit a cell's 1-9/a-z key, or click it; q/Esc closes (-E closes the
# popup when the script exits). -B drops the popup border so it fills the page.
# Overrides tmux's default prefix+o (rotate panes), which alt+hjkl makes
# redundant. See dot_local/bin/executable_tmux-overview.
bind o display-popup -E -B -w 100% -h 100% "$HOME/.local/bin/tmux-overview"

# Splits, opening in the current pane's directory
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# prefix+u — pop up a menu to open something in the default browser: every
# running `make serve` across all sessions (keyed 1-9, from the @server_port we
# track) and every URL visible in the current pane (keyed a-z). Also replaces
# Ghostty's cmd-click-to-open, which `set -g mouse on` (below) swallows before
# Ghostty can see it. See dot_local/bin/executable_tmux-url-open.
bind u run-shell -b "$HOME/.local/bin/tmux-url-open"

# prefix+? — a centred cheatsheet of the keys worth knowing. Bare prefix
# (Ctrl-b) shows nothing on its own, which is baffling when you're new, so this
# replaces the default verbose `list-keys` help with a friendly menu. The key in
# (parentheses) on the right is tmux's own accelerator: press it to run that row
# (or use arrows + Enter). Rows without a (key) are headers or reference only —
# the Alt navigation keys at the bottom are pressed directly, with no prefix.
bind ? display-menu -T "#[align=centre fg=#cba6f7 bold] tmux cheatsheet " -x C -y C \
  "" \
  "-Workspaces & tabs"                  "" "" \
  "Find project / workspace"            f   { display-popup -E -B -w 60% -h 70% "$HOME/.local/bin/tmux-sessionizer" } \
  "Close this workspace (if idle)"      q   { run-shell -b "$HOME/.local/bin/tmux-session-close #{q:session_name} #{q:client_name}" } \
  "Sessions"                            s   { choose-tree -Zs } \
  "All workspaces + tabs"               w   { choose-tree -Zw } \
  "Overview — all tabs montage"         o   { display-popup -E -B -w 100% -h 100% "$HOME/.local/bin/tmux-overview" } \
  "Detach (tmux keeps running)"         d   { detach-client } \
  "" \
  "-This pane / tab"                    "" "" \
  "Split right"                         "|" { split-window -h -c "#{pane_current_path}" } \
  "Split down"                          "-" { split-window -v -c "#{pane_current_path}" } \
  "Zoom / unzoom pane"                  z   { resize-pane -Z } \
  "Scroll / copy mode"                  "[" { copy-mode } \
  "Open a server / URL"                 u   { run-shell -b "$HOME/.local/bin/tmux-url-open" } \
  "" \
  "-tmux itself"                        "" "" \
  "Reload config"                       r   { source-file ~/.tmux.conf } \
  "Command prompt"                      ":" { command-prompt } \
  "All key bindings (full list)"        "?" { list-keys } \
  "" \
  "-Move around — press directly, no prefix" "" "" \
  "-  Alt+h / Alt+l    prev / next tab"           "" "" \
  "-  Alt+j / Alt+k    prev / next workspace"     "" "" \
  "-  Alt+Shift+h / l  move tab left / right"     "" "" \
  "-  Alt+t  new tab      Alt+n  new workspace"   "" "" \
  "-  Alt+q  close workspace (if no busy agent / unsaved nvim)" "" "" \
  "-  Alt+f  find / switch to a project or workspace" "" "" \
  "-  Alt+r  rename tab   Alt+Shift+r  rename ws" "" ""

#### Behaviour ####

set -g mouse on
set -g base-index 1                # number tabs from 1
setw -g pane-base-index 1
set -g renumber-windows on         # keep tab numbers gapless
set -g detach-on-destroy off       # closing a workspace's last tab jumps to
                                   # another workspace instead of quitting tmux
set -g escape-time 10              # no lag after Esc (matters in vim)
set -g focus-events on
set -g history-limit 100000
set -g set-titles on
set -g set-titles-string "#S → #W"

# Auto-name unnamed windows after the running command (claude, nvim, node, …).
# Explicit renames (Alt+r) stick — tmux only auto-renames windows you haven't
# touched yourself.
set -g automatic-rename on

# Claude Code sets its process name to its version (e.g. "2.1.153"), so the
# default rename-format (#{pane_current_command}) would label the tab with a
# version number. Map any semver-looking command to "claude"; everything else
# keeps its command name. Single-quoted so the regex backslashes survive config
# parsing.
set -g automatic-rename-format '#{?#{m/r:^[0-9]+\.[0-9]+\.[0-9]+$,#{pane_current_command}},claude,#{pane_current_command}}'

# Pass through extended key sequences (CSI u / modifyOtherKeys) so apps inside
# tmux can distinguish Shift+Enter, Ctrl+Enter, etc. from a plain Enter.
# Needed for Claude Code's Shift+Enter newline shortcut. The outer terminal
# (Ghostty, …) must already send these sequences.
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Colours / truecolor
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# Copy mode: vi keys; copy to the system clipboard (OSC52 — works over SSH)
setw -g mode-keys vi
set -g set-clipboard on
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

#### Silence tmux's built-in monitors ####
# The per-tab dot is driven entirely by @agent_state (set by the agent
# lifecycle hooks via the `agent-state` script), so tmux's own activity /
# silence / bell monitoring would only add noise — notably a grey "silence"
# dot on every quiet tab (nvim, shells). Turn it all off, and keep any stray
# BEL from a TUI from ringing through.
setw -g monitor-activity off
setw -g monitor-bell off
setw -g monitor-silence 0
set -g visual-bell off
set -g bell-action none

#### Status bar — Catppuccin Mocha ####
# Layout:  [ session ▶ ]  tab  tab  [ active tab ]  tab  …   host  N  [ ● ● ○ ● ]
#    (the pink  plug shows only over SSH — see @ssh_plug below)
#   N — blue count of agents currently running server-wide (hidden when 0)
# Per-tab dot:  ● red needs-input  ·  ● blue running  ·  ○ yellow idle
# Far-right chip (where the clock used to be): one summary dot per session — same
# signal/palette as the per-tab dots, rolled up to the highest-priority state in
# each session, current session's cell highlighted (active-tab surface #45475a).
# See tmux-session-dots.
#
# Status bar bg uses mantle (#181825) locally, slightly darker than the pane
# base (#1e1e2e) so the bar reads as a distinct strip below the panes. When
# the tmux server was started inside an SSH session the bar turns dark amber
# — unmistakable "this is remote" cue at a glance. Every status-bar element
# that wanted bg=mantle now references @status_bg so the transition glyphs
# stay seamless.
if-shell '[ -n "$SSH_CONNECTION" ]' \
  'set -g @status_bg "#3d3017"' \
  'set -g @status_bg "#181825"'

# Over SSH, also show a small plug glyph just left of the host name — a dark
# pink / soft-red "you're connected remotely" marker that pairs with the amber
# bar above. Empty (no glyph, no trailing space) on a local server so the host
# sits flush against the agent count. Set once at server start like @status_bg.
if-shell '[ -n "$SSH_CONNECTION" ]' \
  'set -g @ssh_plug "#[fg=#eba0ac]#[fg=#6c7086] "' \
  'set -g @ssh_plug ""'

set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#{@status_bg},fg=#cdd6f4"

# Session block — mauve "workspace" badge.  Goes red while the prefix key
# is held so you can see it's primed.  Powerline right-triangle ()
# transitions the fill colour into the status-bar bg.
set -g status-left-length 40
set -g status-left "#[bg=#{?client_prefix,#f38ba8,#cba6f7}#,fg=#181825#,bold] #S #[bg=#{@status_bg}#,fg=#{?client_prefix,#f38ba8,#cba6f7}] "

# Window tabs — dim index, brighter name, then a trailing status cluster on the
# right edge of each tab. First, for a running server, the listening port(s) as
# green text on the tab's own background — no fill, so it reads as an annotation
# of the tab rather than a separate block; several ports show when a compose
# stack publishes more than one (@server_state / @server_port, set by the make
# wrapper — see dot_bash_aliases.tmpl and dot_local/bin/executable_server-state /
# server-port-watch); a … placeholder shows until a port is sniffed out. Then
# the agent-state dot driven by @agent_state (the Claude/Codex lifecycle hooks).
# Tabs that are neither set neither option, so they show nothing. Inactive and
# active tabs use identical logic:
#   server → green PORT(S) text (… until detected; lighter green on the active
#            tab so the current server tab stands out)
#   agent  → needs-input red ●   running blue ●   idle yellow ○   unset blank
# Note: each agent branch carries its own leading space, so a non-agent tab adds
# no trailing gap.
set -g window-status-separator ""
set -g window-status-format "#[fg=#585b70] #I #[fg=#a6adc8]#W#{?#{==:#{@server_state},running}, #[fg=#a6e3a1]#{?#{@server_port},#{@server_port},…}#[default],}#{?#{==:#{@agent_state},needs-input}, #[fg=#f38ba8]●,#{?#{==:#{@agent_state},running}, #[fg=#89b4fa]●,#{?#{==:#{@agent_state},idle}, #[fg=#f9e2af]○,}}} "
# Active tab — surface1 bg, bold blue name, mauve index for accent.
set -g window-status-current-format "#[bg=#45475a,fg=#cba6f7,bold] #I #[fg=#89b4fa]#W#{?#{==:#{@server_state},running}, #[fg=#caeec7]#{?#{@server_port},#{@server_port},…}#[fg=#cdd6f4],}#{?#{==:#{@agent_state},needs-input}, #[fg=#f38ba8]●,#{?#{==:#{@agent_state},running}, #[fg=#89b4fa]●,#{?#{==:#{@agent_state},idle}, #[fg=#f9e2af]○,}}} "

# Right side — active tab's git branch, then host, then the session-dots chip.
# The branch (green, powerline  glyph) is the focused pane's branch — see
# dot_local/bin/executable_tmux-git-branch. Since agents run in per-worktree
# tabs on different branches, this answers "which branch is this tab on?"
# without inflating every tab label.
#
# The far-right chip replaces the old %H:%M clock with a row of summary dots, one
# per session, coloured by that session's highest-priority @agent_state (red
# needs-input ● > blue running ● > yellow idle ○ > grey none ●), current session
# bracketed. So a glance at the bar counts how many workspaces are working or
# waiting on me — the whole-server roll-up of the per-tab dots and the alt+f
# finder, current session's
# cell highlighted with the active-tab surface (#45475a) — same "you are here" cue
# as the active window tab. The chip sets bg=#313244 and tmux-session-dots emits
# only #[fg=...]/#[bg=...] (tmux re-expands those #[...] from #() output).
#
# Just left of the chip, next to the host, a blue number counts how many agents
# are running (working) right now across the whole server — a quick "how much is
# in flight" figure, hidden entirely when nothing is running. See
# dot_local/bin/executable_tmux-agent-count.
# Length bumped 80→150 so a long branch plus many session dots aren't truncated.
set -g status-right-length 150
# While the prefix is armed, a pink "? help" chip appears here (left of the
# branch) nudging you to the prefix+? cheatsheet — same pink as the session badge.
set -g status-right "#{?client_prefix,#[fg=#181825 bg=#f38ba8 bold] ? help #[default]  ,}#[fg=#a6e3a1]#(~/.local/bin/tmux-git-branch #{q:pane_current_path})  #{@ssh_plug}#[fg=#6c7086]#H #(~/.local/bin/tmux-agent-count)#[bg=#313244]#(~/.local/bin/tmux-session-dots #{q:session_name})#[default]"

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"
set -g message-style "bg=#313244,fg=#cdd6f4"

# Selected-row highlight in choose-tree (prefix+w) and copy mode. A neutral
# surface-grey bg (matching the active tab) replaces tmux's default yellow, so
# the @agent_state foreground tints in the workspace overview stay readable when
# a row is selected — yellow text on a yellow highlight would otherwise vanish.
set -g mode-style "bg=#45475a,fg=#cdd6f4"
