# ~/.tmux.conf — managed by chezmoi (dot_tmux.conf)
#
# Mental model (mirrors cmux):
#   session = "workspace"     — cmux vertical sidebar tab
#   window  = "terminal tab"  — cmux horizontal tab
#   pane    = a split inside a tab
#
# Navigation uses Alt/Option with no prefix. Option must reach tmux as Meta:
# in Ghostty that's `macos-option-as-alt`. Works locally and over SSH.

#### Navigation — mirrors the cmux alt+vim keybinds ####

# Terminal tabs (windows): Alt+h / Alt+l
bind -n M-h previous-window
bind -n M-l next-window

# Workspaces (sessions): Alt+j / Alt+k
bind -n M-j switch-client -n
bind -n M-k switch-client -p

# Create: Alt+t = new tab (window), Alt+n = new workspace (session)
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-n new-session

# Rename: Alt+r = rename tab, Alt+Shift+r = rename workspace
# (prompt pre-fills with the current name so you can edit it)
bind -n M-r command-prompt -I "#W" "rename-window -- '%%'"
bind -n M-R command-prompt -I "#S" "rename-session -- '%%'"

#### Prefix bindings (prefix is the default Ctrl-b) ####

# Reload this config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Splits, opening in the current pane's directory
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

#### Behaviour ####

set -g mouse on
set -g base-index 1                # number tabs from 1
setw -g pane-base-index 1
set -g renumber-windows on         # keep tab numbers gapless
set -g detach-on-destroy off       # closing a workspace's last tab jumps to
                                   # another workspace instead of quitting tmux
set -g escape-time 10              # no lag after Esc (matters in vim)
set -g focus-events on
set -g history-limit 100000
set -g set-titles on
set -g set-titles-string "#S → #W"

# Colours / truecolor
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# Copy mode: vi keys; copy to the system clipboard (OSC52 — works over SSH)
setw -g mode-keys vi
set -g set-clipboard on
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

#### Per-tab activity monitors ####
# Light up a coloured dot in the status bar for each tab:
#   ● green  — activity (process produced output recently → "running")
#   ○ grey   — silence  (no output for monitor-silence seconds → "idle")
#   ● yellow — bell     (ASCII BEL hit the pane → "needs input")
# Agents signal "needs input" by emitting \a from their notification hooks
# (Claude Code Notification, Codex notify). Flags clear when you visit the tab.
setw -g monitor-activity on
setw -g monitor-bell on
setw -g monitor-silence 30

# Only render the dot — no popup messages, no terminal-bell pass-through.
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g activity-action none
set -g bell-action none
set -g silence-action none

#### Status bar — Catppuccin Mocha ####
# Layout:  [ session ▶ ]  tab  tab  [ active tab ]  tab  …  host  [ time ]
# Per-tab dot:  ● yellow needs-input  ·  ● green running  ·  ○ grey idle
#
# Status bar bg uses mantle (#181825), slightly darker than the pane base
# (#1e1e2e), so the bar reads as a distinct strip below the panes.
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#181825,fg=#cdd6f4"

# Session block — mauve "workspace" badge.  Goes red while the prefix key
# is held so you can see it's primed.  Powerline right-triangle ()
# transitions the fill colour into the status-bar bg.
set -g status-left-length 40
set -g status-left "#[bg=#{?client_prefix,#f38ba8,#cba6f7}#,fg=#181825#,bold] #S #[bg=#181825#,fg=#{?client_prefix,#f38ba8,#cba6f7}] "

# Window tabs — dim index, brighter name, trailing flag-dot.
set -g window-status-separator ""
set -g window-status-format "#[fg=#585b70] #I #[fg=#a6adc8]#W #{?window_bell_flag,#[fg=#f9e2af]●,#{?window_silence_flag,#[fg=#9399b2]○,#{?window_activity_flag,#[fg=#a6e3a1]●, }}} "
# Active tab — surface1 bg, bold blue name, mauve index for accent.
set -g window-status-current-format "#[bg=#45475a,fg=#cba6f7,bold] #I #[fg=#89b4fa]#W   "

# Right side — host then time chip.
set -g status-right-length 40
set -g status-right "#[fg=#6c7086]#H  #[bg=#313244,fg=#cdd6f4] %H:%M "

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"
set -g message-style "bg=#313244,fg=#cdd6f4"
