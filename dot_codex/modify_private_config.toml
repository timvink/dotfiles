#!/bin/sh
# Ensure ~/.codex/config.toml has `notify` configured to ring tmux's
# monitor-bell on agent-turn-complete via the shared agent-bell script.
# That script handles writing to the pane's tty directly (hook subprocesses
# have no controlling tty, so plain `printf '\a' > /dev/tty` fails).
#
# This is a chezmoi modify_ script: stdin = current target content, stdout
# = new content. Idempotent — replaces an existing notify line, or inserts
# one at the top. All other Codex state (project trust levels, marketplaces,
# plugins) is preserved untouched.

set -eu

content=$(cat)
new_line='notify = ["sh", "-c", "$HOME/.local/bin/agent-bell"]'

if printf '%s\n' "$content" | grep -qE '^[[:space:]]*notify[[:space:]]*='; then
    # Replace whatever notify is currently set to.
    printf '%s' "$content" | sed -E "s|^[[:space:]]*notify[[:space:]]*=.*$|$new_line|"
else
    # Top-level TOML keys must precede any [section]; insert at the very top.
    cat <<TOML
# tmux "needs input" bell — emits BEL after each agent turn completes
$new_line

TOML
    printf '%s' "$content"
fi
