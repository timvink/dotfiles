#!/usr/bin/env python3
# chezmoi modify_ script for ~/.codex/config.toml.
#
# Codex owns this file at runtime — it rewrites [projects.*] (trust prompts),
# [tui.*] (NUX counters) and [hooks.*] (trusted hashes) as you use it. So we
# can't manage it as a static file (chezmoi would clobber that state on every
# apply). Instead we PIN the portable settings below and PASS THROUGH Codex's
# runtime sections verbatim.
#
# Why pin `model`: Codex's model-migration logic rewrote `model` to the bare
# "gpt-5.4" after gpt-5.3-codex was removed, but the Azure deployment is named
# "gpt-5.4-codex" — the mismatch caused 404 "deployment does not exist". Pinning
# the deployment name here stops that from recurring. Dead [profiles.global] /
# [notice.model_migrations] 5.3 references are dropped.
#
# chezmoi feeds the current target file on stdin; we emit the desired file.
import sys, re

OWNED = '''# Interactive defaults. Pointed at the shared dev-tools Azure OpenAI
# deployment (EU-resident, Responses API). The key comes from the
# AZURE_OPENAI_API_KEY env var, set by /etc/profile.d/codex.sh.
# Managed by chezmoi (dot_codex/modify_config.toml) — edit the source there,
# not this file. The settings below are pinned; Codex's runtime sections
# ([projects.*], [tui.*], [hooks.*]) are preserved as-is.
model = "gpt-5.4-codex"
model_provider = "azure"
model_reasoning_effort = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[model_providers.azure]
name = "Azure OpenAI"
base_url = "https://aif-nwf-devtools.openai.azure.com/openai/v1"
env_key = "AZURE_OPENAI_API_KEY"
wire_api = "responses"

# MCP servers — mirrors the Claude Code set (~/.claude.json). Codex detects the
# streamable-HTTP transport from the `url` key alone; no extra flags needed.
# This file holds only server definitions — OAuth tokens live in Codex's own
# auth store (not here), so they survive `chezmoi apply`. For each hosted server
# below, authenticate once with `codex mcp login <name>`.
#
# context7 uses its dedicated OAuth endpoint (/mcp/oauth, not /mcp), per
# https://context7.com/docs/howto/oauth — keyless, so no API key in this repo.
[mcp_servers.context7]
url = "https://mcp.context7.com/mcp/oauth"

[mcp_servers.todoist]
url = "https://ai.todoist.net/mcp"

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"

[mcp_servers.cloudflare]
url = "https://mcp.cloudflare.com/mcp"

[mcp_servers.gethumandesign]
url = "https://api.gethumandesign.com/mcp"

[mcp_servers.activecampaign]
url = "https://stilstaanbijjezelf1.activehosted.com/api/agents/mcp/http"

# Local stdio server (Albert Heijn). macOS-only binary path; on a Linux box this
# entry just won't launch — mirrors the Claude setup, which hardcodes the same path.
[mcp_servers.ah]
command = "/Users/timvink/.local/bin/ah-mcp"
args = ["--transport", "stdio"]
'''

PASS_GROUPS = {"projects", "tui", "hooks"}   # runtime state Codex manages

# Managed TUI status line. `context-used` shows the % of the context window
# consumed, so I can see when to /compact; the rest mirrors my Claude Code
# status line (dir · branch · model+reasoning) for cross-tool consistency.
# Codex owns the other [tui.*] sub-tables (NUX counters) and may store its own
# keys in a bare [tui] table — we inject ONLY this key and preserve the rest.
# Item ids: codex's status-line setup menu / `tui.status_line` config reference.
STATUS_LINE = 'status_line = ["current-dir", "git-branch", "model-with-reasoning", "context-used"]'

def group_of(header):
    m = re.match(r'\[+\s*"?([^".\]]+)', header)
    return m.group(1) if m else None

src = sys.stdin.read()

# Split into blocks at column-0 table headers ("[..."). The first block is the
# top-level preamble (keys before any table); we re-author it via OWNED.
blocks, cur = [], []
for ln in src.splitlines(keepends=True):
    if ln.startswith('['):
        if cur:
            blocks.append(cur)
        cur = [ln]
    else:
        cur.append(ln)
if cur:
    blocks.append(cur)

out = [OWNED.rstrip() + "\n"]
tui_bare_seen = False
for b in blocks:
    if not b[0].startswith('['):
        continue  # preamble — re-authored above
    if group_of(b[0]) not in PASS_GROUPS:
        continue
    if b[0].strip() == '[tui]':
        # Bare [tui] table: drop any stale status_line, keep every other
        # runtime key Codex stores here, then append our managed status_line.
        body = [ln for ln in b[1:] if not re.match(r'\s*status_line\s*=', ln)]
        block = ("[tui]\n" + "".join(body)).rstrip()
        out.append("\n" + block + "\n" + STATUS_LINE + "\n")
        tui_bare_seen = True
    else:
        out.append("\n" + "".join(b).rstrip() + "\n")

# No bare [tui] table in the input → synthesize one for our status_line.
# (Valid TOML even with [tui.*] sub-tables present: a super-table may be
# defined out-of-order after its sub-tables.)
if not tui_bare_seen:
    out.append("\n[tui]\n" + STATUS_LINE + "\n")

sys.stdout.write("".join(out))
