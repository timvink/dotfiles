#!/bin/sh
# Ensure ~/.codex/config.toml has `notify` configured to call the shared
# `agent-state` script with "idle" on agent-turn-complete. The script sets
# the per-window tmux @agent_state option that window-status-format reads
# to render the per-tab indicator dot (grey ○ for idle).
#
# Codex's notify only fires one event (agent-turn-complete), so "idle" is
# the only state Codex can signal. Tabs go back to green (via tmux's
# monitor-activity) automatically when Codex resumes producing output.
#
# This is a chezmoi modify_ script: stdin = current target content, stdout
# = new content. Idempotent — replaces an existing notify line, or inserts
# one at the top. All other Codex state (project trust levels, marketplaces,
# plugins) is preserved untouched.

set -eu

content=$(cat)
# Codex's notify only fires on agent-turn-complete, so it always means "idle".
new_line='notify = ["sh", "-c", "$HOME/.local/bin/agent-state idle"]'

if printf '%s\n' "$content" | grep -qE '^[[:space:]]*notify[[:space:]]*='; then
    # Replace whatever notify is currently set to.
    printf '%s' "$content" | sed -E "s|^[[:space:]]*notify[[:space:]]*=.*$|$new_line|"
else
    # Top-level TOML keys must precede any [section]; insert at the very top.
    cat <<TOML
# tmux "needs input" bell — emits BEL after each agent turn completes
$new_line

TOML
    printf '%s' "$content"
fi
